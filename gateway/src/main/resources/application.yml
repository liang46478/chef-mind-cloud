server:
  port: 8080

spring:
  application:
    name: gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user/**
        - id: recipe-service
          uri: lb://recipe-service
          predicates:
            - Path=/api/recipe/**,/api/upload/**,/api/ingredients/**
        - id: meal-plan-service
          uri: lb://meal-plan-service
          predicates:
            - Path=/api/meal-plan/**
        - id: recommendation-service
          uri: lb://recommendation-service
          predicates:
            - Path=/api/recommend/**
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/api/admin/**,/admin/**
    nacos:
      discovery:
        server-addr: localhost:8848

logging:
  level:
    org.springframework.cloud.gateway: INFO
