name: ChefMind CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_USER: postgres, POSTGRES_PASSWORD: postgres }
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports: ["5432:5432"]
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Create databases
        run: |
          for db in chefmind_user chefmind_recipe chefmind_meal_plan chefmind_recommend chefmind_admin; do
            PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE $db;"
          done

      - name: Build Backend
        run: ./mvnw install -DskipTests -q

      - name: Backend Tests
        run: ./mvnw test

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: admin-web/package-lock.json

      - name: Build Frontend
        run: |
          cd admin-web
          npm ci
          npm run build

      - name: Docker Build
        run: docker compose build

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Deploy
        if: github.ref == 'refs/heads/main'
        run: |
          echo "Deploying chef-mind-cloud to production..."
          docker compose up -d
