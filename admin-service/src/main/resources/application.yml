server:
  port: 8085

spring:
  application:
    name: admin-service
  datasource:
    url: jdbc:postgresql://localhost:5432/chefmind_admin
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: localhost
      port: 6379
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.chefmind.admin.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.chefmind: DEBUG
