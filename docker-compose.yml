services:
  # ========== 基础设施 ==========
  postgres:
    image: postgres:16
    container_name: chefmind-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./sql/init:/docker-entrypoint-initdb.d
    networks:
      - chefmind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: chefmind-redis
    ports:
      - "6379:6379"
    networks:
      - chefmind-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nacos:
    image: nacos/nacos-server:v2.3.0
    container_name: chefmind-nacos
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
    ports:
      - "8848:8848"
      - "9848:9848"
    networks:
      - chefmind-net

  # ========== 微服务 ==========
  user-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: user-service
        SERVICE_PORT: 8081
    container_name: chefmind-user-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chefmind_user
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    ports:
      - "8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  recipe-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: recipe-service
        SERVICE_PORT: 8082
    container_name: chefmind-recipe-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chefmind_recipe
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    ports:
      - "8082:8082"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  meal-plan-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: meal-plan-service
        SERVICE_PORT: 8083
    container_name: chefmind-meal-plan-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chefmind_meal_plan
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-your-api-key}
    ports:
      - "8083:8083"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  recommendation-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: recommendation-service
        SERVICE_PORT: 8084
    container_name: chefmind-recommendation-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chefmind_recommend
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    ports:
      - "8084:8084"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  admin-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: admin-service
        SERVICE_PORT: 8085
    container_name: chefmind-admin-service
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/chefmind_admin
      SPRING_DATA_REDIS_HOST: redis
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE_NAME: gateway
        SERVICE_PORT: 8080
    container_name: chefmind-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_CLOUD_NACOS_DISCOVERY_SERVER-ADDR: nacos:8848
    ports:
      - "8080:8080"
    depends_on:
      nacos:
        condition: service_started
    networks:
      - chefmind-net

  # ========== 前端 ==========
  frontend:
    build:
      context: ./admin-web
      dockerfile: Dockerfile
    container_name: chefmind-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - chefmind-net

volumes:
  postgres-data:

networks:
  chefmind-net:
    driver: bridge
